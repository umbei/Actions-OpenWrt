name: Build OpenWrt x86_64 (Lean's lede)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt autoremove -y && sudo apt clean -y
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Download Lean's lede source
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede.git openwrt
          cd openwrt
          ./scripts/feeds update -a

      - name: Add custom plugins (SSH protocol)
        run: |
          # 配置 SSH 免交互拉取
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          
          cd openwrt
          # Passwall
          git clone --depth=1 git@github.com:xiaorouji/openwrt-passwall-packages.git package/passwall-packages
          git clone --depth=1 git@github.com:xiaorouji/openwrt-passwall.git package/passwall
          # Lucky
          git clone --depth=1 git@github.com:gdy666/luci-app-lucky.git package/lucky
          # SmartDNS
          git clone --depth=1 git@github.com:pymumu/luci-app-smartdns.git package/smartdns
          # Install feeds
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          cd openwrt
          [ -f ../.config ] && cp ../.config ./.config
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile OpenWrt
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          ls -lh bin/targets/x86/64/

      - name: Package firmware
        run: |
          mkdir -p firmware
          cp openwrt/bin/targets/x86/64/*.tar.gz firmware/
          cp openwrt/bin/targets/x86/64/*.img.gz firmware/
          cp openwrt/bin/targets/x86/64/*.iso firmware/
          echo "Build Time: $(date +%Y-%m-%d_%H:%M:%S)" > firmware/build-info.txt
          echo "Source: Lean's lede" >> firmware/build-info.txt
          echo "Platform: x86_64" >> firmware/build-info.txt

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_x86_64_${{ github.run_id }}
          path: firmware/

      - name: Release firmware
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'schedule'
        with:
          tag_name: OpenWrt_x86_64_${{ github.run_id }}
          name: OpenWrt x86_64 ${{ github.run_id }}
          body: |
            - 源码：Lean's lede
            - 平台：x86_64
            - 插件：Passwall、SmartDNS、Lucky、Adbyby
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
